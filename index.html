<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ông Năm Chèo's Research Laboratory</title>
    <style>
        /* RESET CƠ BẢN */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Nền đen sâu */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Ngăn cuộn trang nếu chỉ làm trang landing */
        }

        /* KHUNG CHỨA ASCII DONUT LÀM BACKGROUND */
        #donut-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Căn giữa hoàn hảo */
            z-index: 0; /* Đẩy xuống lớp dưới cùng */
            opacity: 0.3; /* Làm mờ để không lấn át nội dung */
            
            /* Sửa lỗi Aspect Ratio ở đây: Không dùng scaleX */
            font-family: monospace; /* Bắt buộc dùng font đơn cách */
            font-size: 14px;
            line-height: 14px; 
            letter-spacing: 2px; /* Kéo giãn khoảng cách chữ một chút để bù trừ tỷ lệ font */
            color: #00ff00; /* Màu xanh hacker cổ điển, có thể đổi sang #555555 cho thanh lịch hơn */
            white-space: pre;
            text-align: center;
        }

        /* NỘI DUNG CHÍNH CỦA WEBSITE ĐÈ LÊN TRÊN */
        .content-overlay {
            position: relative;
            z-index: 1; /* Nổi lên trên background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); /* Thêm bóng chữ để dễ đọc trên nền */
        }

        .content-overlay h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .content-overlay p {
            font-size: 1.2rem;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="content-overlay">
        <h1>Ông Năm Chèo's Research Laboratory</h1>
    </div>

    <div id="donut-background"></div>

    <script>
        // Thuật toán ASCII Donut của Andy Sloane
        const preTag = document.getElementById('donut-background');
        let A = 1, B = 1;

        const renderDonut = () => {
            let b = [];
            let z = [];
            A += 0.05; // Tốc độ xoay trục X
            B += 0.03; // Tốc độ xoay trục Y
            
            let cA = Math.cos(A), sA = Math.sin(A),
                cB = Math.cos(B), sB = Math.sin(B);
                
            for (let k = 0; k < 1760; k++) {
                b[k] = k % 80 === 79 ? "\n" : " ";
                z[k] = 0;
            }
            
            for (let j = 0; j < 6.28; j += 0.07) {
                let ct = Math.cos(j), st = Math.sin(j);
                for (let i = 0; i < 6.28; i += 0.02) {
                    let sp = Math.sin(i), cp = Math.cos(i),
                        h = ct + 2, 
                        D = 1 / (sp * h * sA + st * cA + 5), 
                        t = sp * h * cA - st * sA;
                        
                    let x = 0 | (40 + 30 * D * (cp * h * cB - t * sB)),
                        y = 0 | (12 + 15 * D * (cp * h * sB + t * cB)),
                        o = x + 80 * y,
                        N = 0 | (8 * ((st * sA - sp * ct * cA) * cB - sp * ct * sA - st * cA - cp * ct * sB));
                        
                    if (y < 22 && y >= 0 && x >= 0 && x < 79 && D > z[o]) {
                        z[o] = D;
                        b[o] = ".,-~:;=!*#$@"[N > 0 ? N : 0];
                    }
                }
            }
            preTag.innerHTML = b.join("");
        };

        // Chạy 30 khung hình / giây
        setInterval(renderDonut, 63);
    </script>
</body>
</html>
