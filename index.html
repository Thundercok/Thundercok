<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ông Năm Chèo · Research Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --green: #00ff41;
      --green2: #00cc33;
      --green3: #008f11;
      --dim: #003b00;
      --bg: #020c02;
      --bg2: #040f04;
      --border: #0a1f0a;
      --text: #b0ffb0;
      --muted: #2a4a2a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── FLOW FIELD CANVAS ── */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      93% {
        opacity: .92
      }

      94% {
        opacity: 1
      }

      97% {
        opacity: .95
      }

      98% {
        opacity: 1
      }
    }

    #shell {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      animation: flicker 6s infinite;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 12, 2, 0.85);
      flex-shrink: 0;
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: var(--green);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--green3);
    }

    .tb-status {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .tb-status span {
      color: var(--amber);
    }

    /* Amber for "INITIALIZING" */
    .tb-right {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: right;
      line-height: 1.8;
    }

    .tb-right .live {
      color: var(--green);
      animation: blink 1.2s step-end infinite;
    }

    /* ── HERO CONTENT ── */
    #content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      z-index: 10;
      pointer-events: none;
    }

    .hero-box {
      background: rgba(2, 12, 2, 0.7);
      border: 1px solid var(--border);
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 59, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    .hero-title {
      font-family: 'VT323', monospace;
      font-size: 64px;
      color: var(--green);
      letter-spacing: 6px;
      text-shadow: 0 0 20px var(--green3);
      line-height: 1;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    .terminal-line {
      font-size: 16px;
      color: var(--text);
      letter-spacing: 1px;
      display: inline-block;
      text-align: left;
    }

    .prompt {
      color: var(--green3);
      margin-right: 8px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 16px;
      background-color: var(--green);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── BOTTOM STATUS BAR ── */
    #statusbar {
      height: 26px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(2, 8, 2, 0.95);
      flex-shrink: 0;
      z-index: 2;
    }

    .sb {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .sb.green {
      color: var(--green3);
    }
  </style>
</head>

<body>

  <canvas id="canvas-bg"></canvas>

  <div id="shell">
    <div id="topbar">
      <div class="tb-left">
        <div class="logo">ONC//LAB</div>
        <div class="tb-status">SYS:<span style="color:#ffb000">BOOTING</span> &nbsp;|&nbsp; DB:<span>EMPTY</span></div>
      </div>
      <div class="tb-right">
        <span id="clock-display">--:--:--</span><br>
        <span class="live">● LIVE</span>
      </div>
    </div>

    <div id="content">
      <div class="hero-box">
        <div class="hero-title">ÔNG NĂM CHÈO</div>
        <div class="hero-sub">RESEARCH LABORATORY &nbsp;·&nbsp; INITIALIZING</div>

        <div class="terminal-line">
          <span class="prompt">guest@onc-lab:~$</span> ông ba chèo đang cố học data hehe<span class="cursor"></span>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span class="sb">AWAITING FIRST DATA INPUT...</span>
      <span class="sb green">FLOW_FIELD::ACTIVE</span>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. CLOCK
    // ==========================================
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock-display').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // ==========================================
    // 2. CANVAS BACKGROUND
    // ==========================================
    const cv = document.getElementById('canvas-bg');
    const ctx = cv.getContext('2d');
    const CELL = 14; let ft = 0, mouse = { x: -9999, y: -9999, active: false }, ripples = [];

    function resizeCanvas() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);

    const P = Array.from({ length: 512 }, () => Math.random() * Math.PI * 2);
    function noise(x, y, z) {
      const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy; const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
      const id = (a, b) => ((a & 255) + (b & 255) * 256) & 511;
      const a = Math.sin(P[id(ix, iy)] + z), b = Math.sin(P[id(ix + 1, iy)] + z), c = Math.sin(P[id(ix, iy + 1)] + z), d = Math.sin(P[id(ix + 1, iy + 1)] + z);
      return (a + (b - a) * sx + (c - a) * sy + (d + a - b - c) * sx * sy) * 0.5 + 0.5;
    }
    function lerpA(a, b, t) { let d = b - a; while (d > Math.PI) d -= Math.PI * 2; while (d < -Math.PI) d += Math.PI * 2; return a + d * t; }
    function gChar(angle, speed) {
      if (speed < 0.12) return ' '; if (speed < 0.28) return '·';
      const seg = Math.floor((((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)) / (Math.PI * 2) * 8);
      if (speed < 0.52) return ['—', '\\', '|', '/', '—', '\\', '|', '/'][seg];
      if (speed < 0.75) return ['+', '×', '*', '+', '×', '*', '+', '×'][seg];
      return ['#', '@', '$', '%', '#', '@', '$', '%'][seg];
    }

    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
    document.addEventListener('mouseleave', () => { mouse.active = false; });
    document.addEventListener('click', e => { ripples.push({ x: e.clientX, y: e.clientY, age: 0, maxAge: 45 }); });

    function drawFlow() {
      ft += 0.014; ripples = ripples.filter(r => r.age < r.maxAge); ripples.forEach(r => r.age++);
      ctx.clearRect(0, 0, cv.width, cv.height); ctx.font = `${CELL - 2}px 'Share Tech Mono', monospace`;
      const cols = Math.ceil(cv.width / CELL), rows = Math.ceil(cv.height / CELL);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = c * CELL + CELL / 2, py = r * CELL + CELL / 2, nx = c / cols, ny = r / rows;
          let angle = noise(nx * 3, ny * 3, ft * 0.35) * Math.PI * 4, speed = noise(nx * 4 + 10, ny * 4 + 10, ft * 0.25 + 5);

          if (mouse.active) {
            const dx = px - mouse.x, dy = py - mouse.y, dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) { const inf = Math.pow(1 - dist / 140, 2) * 0.9; angle = lerpA(angle, Math.atan2(dy, dx) + Math.PI, inf); speed = Math.min(1, speed + inf * 0.4); }
          }
          ripples.forEach(rip => {
            const dx = px - rip.x, dy = py - rip.y, dist = Math.sqrt(dx * dx + dy * dy), wf = (rip.age / rip.maxAge) * 280;
            if (Math.abs(dist - wf) < 35) { const ri = (1 - Math.abs(dist - wf) / 35) * (1 - rip.age / rip.maxAge) * 0.75; angle = lerpA(angle, Math.atan2(dy, dx), ri); speed = Math.min(1, speed + ri * 0.5); }
          });

          const ch = gChar(angle, speed); if (ch === ' ') continue;
          let g = Math.floor(100 + speed * 155), alpha = 0.18 + speed * 0.55, blueV = 0;
          if (mouse.active) {
            const dx = px - mouse.x, dy = py - mouse.y, dist = Math.sqrt(dx * dx + dy * dy), prox = Math.max(0, 1 - dist / 180);
            blueV = Math.floor(prox * 120); alpha = Math.min(0.9, alpha + prox * 0.25);
          }
          ctx.fillStyle = `rgba(0,${g},${blueV},${alpha})`; ctx.fillText(ch, c * CELL, r * CELL + CELL);
        }
      }
      requestAnimationFrame(drawFlow);
    }
    drawFlow();
  </script>
</body>

</html>
