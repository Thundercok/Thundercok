<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Donut ASCII</title>
    <style>
        /* Định dạng giao diện tối giản để làm nổi bật chiếc bánh donut */
        body {
            background-color: #000; /* Nền đen */
            color: #0f0; /* Chữ màu xanh lá cây (phong cách matrix) */
            font-family: monospace; /* Bắt buộc dùng font đơn cách để ASCII không bị lệch */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Ẩn thanh cuộn */
        }
        
        /* Định dạng phần hiển thị ASCII */
        pre {
            font-size: 10px; /* Cỡ chữ nhỏ để donut hiển thị chi tiết */
            line-height: 10px; /* Khoảng cách dòng chặt chẽ */
            letter-spacing: 0.5px; /* Khoảng cách chữ */
            display: inline-block;
            transform: scaleX(2.5); /* Tăng chiều ngang để donut trông "dày" hơn */
        }
        
        /* Tùy chỉnh màu sắc tùy ý */
        .color-A { color: #f0f; } /* Màu hồng */
        .color-B { color: #0ff; } /* Màu xanh cyan */
    </style>
</head>
<body>

<pre id="donut"></pre>

<script>
    /* * Đoạn script này là phiên bản JavaScript của "Donut.c"
     * được viết bởi Andy Sloane.
     * Nó tính toán ma trận 3D của một hình xuyến (donut)
     * và xoay nó trong không gian.
     */
    
    (function() {
        var pre = document.getElementById('donut');
        var A=0, B=0;
        
        // Hàm tính toán và vẽ donut
        function drawDonut() {
            var b=[];
            var z=[];
            A += 0.07; // Tăng góc xoay X
            B += 0.03; // Tăng góc xoay Y
            
            var cA=Math.cos(A), sA=Math.sin(A),
                cB=Math.cos(B), sB=Math.sin(B);
                
            for(var k=0;k<1760;k++) {
                b[k]=k%80==79 ? "\n" : " "; // Tạo ký tự dòng mới ở cuối mỗi dòng
                z[k]=0;
            }
            
            for(var j=0; j<6.28; j+=0.07) { // Vòng lặp theta
                var ct=Math.cos(j), st=Math.sin(j);
                for(var i=0; i<6.28; i+=0.02) { // Vòng lặp phi
                    var sp=Math.sin(i), cp=Math.cos(i),
                        h=ct+2, // Bán kính vòng xuyến
                        D=1/(sp*h*sA+st*cA+5), // Giá trị Z (chiều sâu)
                        t=sp*h*cA-st*sA;
                        
                    // Tính tọa độ X, Y trong không gian 2D trên màn hình
                    var x=0|(40+30*D*(cp*h*cB-t*sB)),
                        y=0|(12+15*D*(cp*h*sB+t*cB)),
                        o=x+80*y, // Vị trí trong mảng ký tự
                        
                        // Độ sáng của điểm ảnh (dựa trên hướng của vector pháp tuyến)
                        N=0|(8*((st*sA-sp*ct*cA)*cB-sp*ct*sA-st*cA-cp*ct*sB));
                        
                    if(y<22 && y>=0 && x>=0 && x<79 && D>z[o]) {
                        z[o]=D;
                        // Chọn ký tự ASCII tương ứng với độ sáng
                        b[o]=".,-~:;=!*#$@"[N>0?N:0];
                    }
                }
            }
            
            // Cập nhật nội dung của thẻ <pre>
            pre.innerHTML = b.join("");
        }
        
        // Gọi hàm drawDonut 30 lần mỗi giây (30 FPS)
        setInterval(drawDonut, 33);
        
    })();
</script>

</body>
</html>
