<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ông Năm Chèo · Research Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --green: #00ff41;
      --green2: #00cc33;
      --green3: #008f11;
      --dim: #003b00;
      --bg: #020c02;
      --bg2: #040f04;
      --border: #0a1f0a;
      --text: #b0ffb0;
      --muted: #2a4a2a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── BOOT SCREEN ── */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 40px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--green);
      transition: opacity 0.4s ease-out;
      pointer-events: none;
    }

    .boot-line {
      font-size: 14px;
      margin-bottom: 6px;
      text-shadow: 0 0 5px var(--green3);
    }

    /* ── FLOW FIELD CANVAS ── */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      93% {
        opacity: .92
      }

      94% {
        opacity: 1
      }

      97% {
        opacity: .95
      }

      98% {
        opacity: 1
      }
    }

    #shell {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      animation: flicker 6s infinite;
    }

    /* ── TOP BAR & TABS ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 12, 2, 0.85);
      flex-shrink: 0;
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: var(--green);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--green3);
    }

    .tb-status {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .tb-status span {
      color: var(--green3);
    }

    .tb-right {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: right;
      line-height: 1.8;
    }

    .tb-right .live {
      color: var(--green);
      animation: blink 1.2s step-end infinite;
    }

    #tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 8, 2, 0.9);
      flex-shrink: 0;
      padding: 0 20px;
    }

    .tab {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .15s;
    }

    .tab::before {
      content: '[ ';
      color: var(--dim);
    }

    .tab::after {
      content: ' ]';
      color: var(--dim);
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
      text-shadow: 0 0 8px var(--green3);
    }

    .tab.active::before,
    .tab.active::after {
      color: var(--green3);
    }

    .tab:hover:not(.active) {
      color: var(--green3);
    }

    /* ── CONTENT AREA ── */
    #content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .pane {
      display: none;
      height: 100%;
      padding: 20px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--dim) transparent;
    }

    .pane.active {
      display: flex;
    }

    /* ── PANE HOME ── */
    #pane-home {
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .hero-box {
      background: rgba(2, 12, 2, 0.7);
      border: 1px solid var(--border);
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 59, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    .hero-title {
      font-family: 'VT323', monospace;
      font-size: 64px;
      color: var(--green);
      letter-spacing: 6px;
      text-shadow: 0 0 20px var(--green3);
      line-height: 1;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    .terminal-line {
      font-size: 16px;
      color: var(--text);
      letter-spacing: 1px;
      text-align: left;
    }

    .prompt {
      color: var(--green3);
      margin-right: 8px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 16px;
      background-color: var(--green);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── PANE PAPERS ── */
    #pane-papers {
      flex-direction: column;
      padding: 20px;
    }

    .papers-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      height: 100%;
      width: 100%;
    }

    .papers-sidebar {
      border-right: 1px solid var(--border);
      padding-right: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .pane-title {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--green3);
      margin-bottom: 4px;
    }

    .papers-sidebar input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      letter-spacing: 1px;
    }

    .papers-sidebar input:focus {
      border-color: var(--green3);
    }

    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ptag {
      font-size: 10px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s;
    }

    .ptag.on {
      border-color: var(--green3);
      color: var(--green);
      background: rgba(0, 255, 65, 0.05);
    }

    .ptag:hover:not(.on) {
      color: var(--green3);
      border-color: var(--dim);
    }

    .paper-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 5px;
    }

    .pcard {
      border: 1px solid var(--border);
      padding: 12px;
      cursor: pointer;
      transition: all .15s;
      background: rgba(0, 255, 65, 0.01);
    }

    .pcard:hover,
    .pcard.active {
      border-color: var(--green3);
      background: rgba(0, 255, 65, 0.04);
    }

    .pcard.active .pc-title {
      color: var(--green);
    }

    .pc-tag {
      font-size: 10px;
      color: var(--green3);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .pc-title {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .content-viewer {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      background: rgba(2, 8, 2, 0.5);
    }

    .viewer-title {
      flex: 1;
      color: var(--green3);
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green);
      border: 1px solid var(--border);
      padding: 4px 12px;
      cursor: pointer;
      background: transparent;
      letter-spacing: 1px;
      transition: all .15s;
    }

    .viewer-btn:hover {
      background: var(--green3);
      color: var(--bg);
    }

    .iframe-wrap {
      flex: 1;
      border: 1px solid var(--border);
      background: #fff;
    }

    #content-embed {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── BOTTOM STATUS BAR ── */
    #statusbar {
      height: 26px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(2, 8, 2, 0.95);
      flex-shrink: 0;
      z-index: 2;
    }

    .sb {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .sb.green {
      color: var(--green3);
    }
  </style>
</head>

<body>

  <div id="boot-screen"></div>

  <canvas id="canvas-bg"></canvas>

  <div id="shell">
    <div id="topbar">
      <div class="tb-left">
        <div class="logo">ONC//LAB</div>
        <div class="tb-status">SYS:<span id="sys-status">ONLINE</span> &nbsp;|&nbsp; MODULE:<span>DATA_OP</span></div>
      </div>
      <div class="tb-right">
        <span id="clock-display">--:--:--</span><br>
        <span class="live">● LIVE</span>
      </div>
    </div>

    <div id="tabs">
      <div class="tab active" data-tab="home">HOME</div>
      <div class="tab" data-tab="papers">PAPERS</div>
    </div>

    <div id="content">
      <div id="pane-home" class="pane active">
        <div class="hero-box">
          <div class="hero-title">ÔNG NĂM CHÈO</div>
          <div class="hero-sub">RESEARCH LABORATORY &nbsp;·&nbsp; TDTU</div>
          <div class="terminal-line">
            <span class="prompt">guest@onc-lab:~$</span> ông ba chèo đang cố học data hehe<span class="cursor"></span>
          </div>
        </div>
      </div>

      <div id="pane-papers" class="pane">
        <div class="papers-layout">
          <div class="papers-sidebar">
            <div class="pane-title">// REPOSITORY</div>
            <input id="psearch" placeholder="> SEARCH QUERY..." oninput="renderPapers()" />
            <div class="tag-filters" id="ptags"></div>
            <div class="paper-list" id="plist"></div>
          </div>
          <div class="content-viewer">
            <div class="viewer-toolbar">
              <span class="viewer-title" id="viewer-title">...</span>
              <button class="viewer-btn" onclick="openExternal()">[↗] OPEN IN NEW TAB</button>
            </div>
            <div class="iframe-wrap">
              <iframe id="content-embed" title="Content viewer"></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span class="sb">AWAITING INPUT...</span>
      <span class="sb green">FLOW_FIELD::ACTIVE</span>
    </div>
  </div>

  <script>
    // ==========================================
    // 0. BOOT SEQUENCE LOGIC
    // ==========================================
    const bootScreen = document.getElementById('boot-screen');
    const isBooted = sessionStorage.getItem('onc_lab_booted');

    async function typeBootLine(text, delay = 20) {
      const line = document.createElement('div');
      line.className = 'boot-line';
      bootScreen.appendChild(line);
      for (let i = 0; i < text.length; i++) {
        line.textContent += text[i];
        await new Promise(r => setTimeout(r, delay));
      }
    }

    async function runBoot() {
      if (!isBooted) {
        // Lần đầu load web
        await typeBootLine("ONC//LAB KERNEL v2.0.1 INITIALIZING...", 30);
        await new Promise(r => setTimeout(r, 300));
        await typeBootLine("MOUNTING FILESYSTEM... [OK]");
        await typeBootLine("LOADING FLOW_FIELD ENGINE... [OK]");
        await typeBootLine("ESTABLISHING DB CONNECTION... [OK]");
        await new Promise(r => setTimeout(r, 400));
        await typeBootLine("SYSTEM READY. LOGGING IN...");
        await new Promise(r => setTimeout(r, 500));
        sessionStorage.setItem('onc_lab_booted', 'true');
      } else {
        // Khi F5 reload web
        await typeBootLine("WELCOME BACK. RESUMING SESSION...", 15);
        await new Promise(r => setTimeout(r, 400));
      }

      bootScreen.style.opacity = '0';
      setTimeout(() => bootScreen.style.display = 'none', 400);
    }
    runBoot();

    // ==========================================
    // 1. DATA & UI LOGIC
    // ==========================================
    const papers = [
      { id: 'vrptw-alns', title: 'Adaptive Large Neighborhood Search for VRPTW', year: 2024, tags: ['vrptw'], url: 'papers/vrptw-alns.pdf', type: 'PDF' },
      { id: 'metro-tft', title: 'Demand Forecasting for HCMC Metro Line 1', year: 2024, tags: ['metro'], url: 'papers/metro-tft.pdf', type: 'PDF' },
      { id: 'rl-mdvrp', title: 'Reinforcement Learning for Multi-Depot Vehicle Routing', year: 2023, tags: ['ml', 'vrptw'], url: 'papers/rl-mdvrp.pdf', type: 'PDF' },
    ];

    // Clock
    function updateClock() {
      const now = new Date(); const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock-display').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // Tabs Switcher
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('pane-' + t.dataset.tab).classList.add('active');
      });
    });

    // Papers Viewer Logic
    const allTags = ['ALL', ...new Set(papers.flatMap(p => p.tags).map(t => t.toUpperCase()))];
    let activeTag = 'ALL', activePaper = null;

    function renderTagFilters() {
      const el = document.getElementById('ptags'); el.innerHTML = '';
      allTags.forEach(tag => {
        const d = document.createElement('div');
        d.className = 'ptag' + (tag === activeTag ? ' on' : '');
        d.textContent = tag;
        d.onclick = () => { activeTag = tag; renderTagFilters(); renderPapers(); };
        el.appendChild(d);
      });
    }

    function renderPapers() {
      const q = document.getElementById('psearch').value.toLowerCase();
      const filtered = papers.filter(p => {
        const tagOk = activeTag === 'ALL' || p.tags.map(t => t.toUpperCase()).includes(activeTag);
        const searchOk = !q || p.title.toLowerCase().includes(q);
        return tagOk && searchOk;
      });

      const el = document.getElementById('plist'); el.innerHTML = '';
      filtered.forEach(p => {
        const d = document.createElement('div');
        d.className = 'pcard' + (activePaper === p.id ? ' active' : '');
        d.innerHTML = `<div class="pc-tag">[${p.tags[0].toUpperCase()}] ${p.year} | ${p.type}</div><div class="pc-title">${p.title}</div>`;
        d.onclick = () => loadPaper(p);
        el.appendChild(d);
      });
    }

    function loadPaper(p) {
      activePaper = p.id; renderPapers();
      document.getElementById('viewer-title').textContent = p.title;
      document.getElementById('content-embed').src = p.url;
    }

    function openExternal() {
      const p = papers.find(x => x.id === activePaper);
      if (p) window.open(p.url, '_blank');
    }

    // Auto-load bài đầu tiên để không bị trống
    renderTagFilters(); renderPapers();
    if (papers.length > 0) loadPaper(papers[0]);

    // ==========================================
    // 2. CANVAS BACKGROUND (FIXED RESOLUTION)
    // ==========================================
    const cv = document.getElementById('canvas-bg');
    const ctx = cv.getContext('2d');
    const CELL = 14; let ft = 0, mouse = { x: -9999, y: -9999, active: false }, ripples = [];

    // Sửa lỗi vỡ hạt bằng DevicePixelRatio
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      cv.width = window.innerWidth * dpr;
      cv.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      cv.style.width = window.innerWidth + 'px';
      cv.style.height = window.innerHeight + 'px';
    }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);

    const P = Array.from({ length: 512 }, () => Math.random() * Math.PI * 2);
    function noise(x, y, z) {
      const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy; const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
      const id = (a, b) => ((a & 255) + (b & 255) * 256) & 511;
      const a = Math.sin(P[id(ix, iy)] + z), b = Math.sin(P[id(ix + 1, iy)] + z), c = Math.sin(P[id(ix, iy + 1)] + z), d = Math.sin(P[id(ix + 1, iy + 1)] + z);
      return (a + (b - a) * sx + (c - a) * sy + (d + a - b - c) * sx * sy) * 0.5 + 0.5;
    }
    function lerpA(a, b, t) { let d = b - a; while (d > Math.PI) d -= Math.PI * 2; while (d < -Math.PI) d += Math.PI * 2; return a + d * t; }
    function gChar(angle, speed) {
      if (speed < 0.12) return ' '; if (speed < 0.28) return '·';
      const seg = Math.floor((((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)) / (Math.PI * 2) * 8);
      if (speed < 0.52) return ['—', '\\', '|', '/', '—', '\\', '|', '/'][seg];
      if (speed < 0.75) return ['+', '×', '*', '+', '×', '*', '+', '×'][seg];
      return ['#', '@', '$', '%', '#', '@', '$', '%'][seg];
    }

    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
    document.addEventListener('mouseleave', () => { mouse.active = false; });
    document.addEventListener('click', e => { ripples.push({ x: e.clientX, y: e.clientY, age: 0, maxAge: 45 }); });

    function drawFlow() {
      ft += 0.014; ripples = ripples.filter(r => r.age < r.maxAge); ripples.forEach(r => r.age++);

      // Dùng toạ độ logic (chưa scale dpr) cho việc vẽ
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.font = `${CELL - 2}px 'Share Tech Mono', monospace`;

      const cols = Math.ceil(window.innerWidth / CELL), rows = Math.ceil(window.innerHeight / CELL);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = c * CELL + CELL / 2, py = r * CELL + CELL / 2, nx = c / cols, ny = r / rows;
          let angle = noise(nx * 3, ny * 3, ft * 0.35) * Math.PI * 4, speed = noise(nx * 4 + 10, ny * 4 + 10, ft * 0.25 + 5);

          if (mouse.active) {
            const dx = px - mouse.x, dy = py - mouse.y, dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) { const inf = Math.pow(1 - dist / 140, 2) * 0.9; angle = lerpA(angle, Math.atan2(dy, dx) + Math.PI, inf); speed = Math.min(1, speed + inf * 0.4); }
          }
          ripples.forEach(rip => {
            const dx = px - rip.x, dy = py - rip.y, dist = Math.sqrt(dx * dx + dy * dy), wf = (rip.age / rip.maxAge) * 280;
            if (Math.abs(dist - wf) < 35) { const ri = (1 - Math.abs(dist - wf) / 35) * (1 - rip.age / rip.maxAge) * 0.75; angle = lerpA(angle, Math.atan2(dy, dx), ri); speed = Math.min(1, speed + ri * 0.5); }
          });

          const ch = gChar(angle, speed); if (ch === ' ') continue;
          let g = Math.floor(100 + speed * 155), alpha = 0.18 + speed * 0.55, blueV = 0;
          if (mouse.active) {
            const dx = px - mouse.x, dy = py - mouse.y, dist = Math.sqrt(dx * dx + dy * dy), prox = Math.max(0, 1 - dist / 180);
            blueV = Math.floor(prox * 120); alpha = Math.min(0.9, alpha + prox * 0.25);
          }
          ctx.fillStyle = `rgba(0,${g},${blueV},${alpha})`; ctx.fillText(ch, c * CELL, r * CELL + CELL);
        }
      }
      requestAnimationFrame(drawFlow);
    }
    drawFlow();
  </script>
</body>

</html>
